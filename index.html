<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoFlow Design Assets</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface-hover: #252530;
  --border: #2a2a35;
  --text: #e4e4e8;
  --text-muted: #8b8b96;
  --accent: #578cff;
  --success: #00d15c;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
}
.header-title span { color: var(--accent); }
.search-box {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: "\1F50D";
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.5;
}
.stats {
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Content */
.content { padding: 32px; }
.section { margin-bottom: 40px; }
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* Icon Grid */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 8px;
}
.icon-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  border: 1px solid transparent;
  position: relative;
}
.icon-card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}
.icon-card:active { transform: scale(0.95); }
.icon-card.copied {
  border-color: var(--success);
  background: rgba(0, 209, 92, 0.08);
}
.icon-card img {
  width: 32px;
  height: 32px;
  object-fit: contain;
  margin-bottom: 8px;
}
.icon-card .icon-name {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  word-break: break-all;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.icon-card .copy-hint {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 10px;
  color: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}
.icon-card:hover .copy-hint { opacity: 1; }

/* Drag states */
.sortable-ghost {
  opacity: 0.3;
  background: var(--surface);
  border: 1px dashed var(--accent);
}
.sortable-chosen { cursor: grabbing; }
.icon-card.drag-handle { cursor: grab; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--success);
  color: #000;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease;
  z-index: 1000;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Loading */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
}
.loading::after {
  content: "";
  display: block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 16px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty */
.empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 14px;
}

/* Save indicator */
.save-indicator {
  position: fixed;
  top: 16px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
}
.save-indicator.show { opacity: 1; }
.save-indicator.success { color: var(--success); border-color: var(--success); }
.save-indicator.error { color: #ff5555; border-color: #ff5555; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>EcoFlow</span> Design Assets</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索图标名称...">
  </div>
  <div class="stats" id="stats">加载中...</div>
</div>

<div class="content" id="content">
  <div class="loading">正在加载资产列表...</div>
</div>

<div class="toast" id="toast"></div>
<div class="save-indicator" id="saveIndicator"></div>

<script>
// ========== CONFIG ==========
const OWNER = 'wangshuaisuai';
const REPO = 'ecoflow-design-assets';
const BRANCH = 'main';
const CDN_BASE = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}`;

function getToken() {
  let token = localStorage.getItem('gh_pat');
  if (!token) {
    token = prompt('请输入 GitHub Personal Access Token（仅需输入一次，将保存在本地）：');
    if (token) localStorage.setItem('gh_pat', token.trim());
  }
  return token;
}

// ========== STATE ==========
let svgFiles = [];
let pngFiles = [];
let orderData = { svg: [], png: [] };
let orderSha = null;
let saveTimeout = null;

// ========== GITHUB API ==========
async function ghAPI(path, method, body) {
  const token = getToken();
  if (!token) return null;
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}${path}`, {
    method: method || 'GET',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok && method === 'GET') return null;
  return res.json();
}

async function loadFiles() {
  const [svgData, pngData, orderRes] = await Promise.all([
    ghAPI('/contents/icons/svg'),
    ghAPI('/contents/icons/png'),
    ghAPI('/contents/config/order.json')
  ]);

  svgFiles = (svgData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);
  pngFiles = (pngData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);

  if (orderRes && orderRes.content) {
    try {
      orderData = JSON.parse(atob(orderRes.content.replace(/\n/g, '')));
      orderSha = orderRes.sha;
    } catch(e) { orderData = { svg: [], png: [] }; }
  }

  svgFiles = applyOrder(svgFiles, orderData.svg || []);
  pngFiles = applyOrder(pngFiles, orderData.png || []);

  render();
}

function applyOrder(files, order) {
  if (!order.length) return files.sort();
  const ordered = [];
  for (const name of order) {
    if (files.includes(name)) ordered.push(name);
  }
  for (const name of files) {
    if (!ordered.includes(name)) ordered.push(name);
  }
  return ordered;
}

// ========== RENDER ==========
function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const filteredSvg = svgFiles.filter(f => f.toLowerCase().includes(query));
  const filteredPng = pngFiles.filter(f => f.toLowerCase().includes(query));
  const total = svgFiles.length + pngFiles.length;
  const showing = filteredSvg.length + filteredPng.length;

  document.getElementById('stats').textContent = query
    ? `显示 ${showing} / 共 ${total} 个资产`
    : `共 ${total} 个资产（SVG ${svgFiles.length} · PNG ${pngFiles.length}）`;

  const content = document.getElementById('content');
  let html = '';

  if (filteredSvg.length > 0) {
    html += `<div class="section">
      <div class="section-title">SVG 图标 <span class="section-count">${filteredSvg.length}</span></div>
      <div class="icon-grid" id="grid-svg">
        ${filteredSvg.map(f => iconCard(f, 'svg')).join('')}
      </div>
    </div>`;
  }

  if (filteredPng.length > 0) {
    html += `<div class="section">
      <div class="section-title">PNG 切图 <span class="section-count">${filteredPng.length}</span></div>
      <div class="icon-grid" id="grid-png">
        ${filteredPng.map(f => iconCard(f, 'png')).join('')}
      </div>
    </div>`;
  }

  if (!filteredSvg.length && !filteredPng.length) {
    html = '<div class="empty">没有找到匹配的资产</div>';
  }

  content.innerHTML = html;
  initSortable();
}

function iconCard(filename, type) {
  const src = `${CDN_BASE}/icons/${type}/${filename}`;
  const displayName = filename.replace(/@[23]x\.png$/, '').replace(/\.svg$/, '').replace(/\.png$/, '');
  return `<div class="icon-card drag-handle" data-name="${filename}" data-type="${type}" onclick="copyLink(this, '${type}', '${filename}')">
    <span class="copy-hint">复制</span>
    <img src="${src}" alt="${displayName}" loading="lazy">
    <span class="icon-name">${displayName}</span>
  </div>`;
}

// ========== COPY ==========
function copyLink(el, type, filename) {
  const url = `${CDN_BASE}/icons/${type}/${filename}`;
  navigator.clipboard.writeText(url).then(() => {
    el.classList.add('copied');
    showToast(`已复制: ${filename}`);
    setTimeout(() => el.classList.remove('copied'), 1500);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ========== SORTABLE ==========
function initSortable() {
  const svgGrid = document.getElementById('grid-svg');
  const pngGrid = document.getElementById('grid-png');

  if (svgGrid) {
    new Sortable(svgGrid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: () => saveOrder()
    });
  }
  if (pngGrid) {
    new Sortable(pngGrid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: () => saveOrder()
    });
  }
}

function saveOrder() {
  const svgGrid = document.getElementById('grid-svg');
  const pngGrid = document.getElementById('grid-png');

  if (svgGrid) {
    svgFiles = [...svgGrid.querySelectorAll('.icon-card')].map(el => el.dataset.name);
    orderData.svg = svgFiles;
  }
  if (pngGrid) {
    pngFiles = [...pngGrid.querySelectorAll('.icon-card')].map(el => el.dataset.name);
    orderData.png = pngFiles;
  }

  clearTimeout(saveTimeout);
  showSaveIndicator('保存中...');
  saveTimeout = setTimeout(commitOrder, 1000);
}

async function commitOrder() {
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(orderData, null, 2))));
    const body = {
      message: '更新图标排序',
      content: content,
      branch: BRANCH
    };
    if (orderSha) body.sha = orderSha;

    const res = await ghAPI('/contents/config/order.json', 'PUT', body);
    if (res && res.content) {
      orderSha = res.content.sha;
      showSaveIndicator('已保存', 'success');
    } else {
      showSaveIndicator('保存失败', 'error');
    }
  } catch (e) {
    showSaveIndicator('保存失败', 'error');
  }
}

function showSaveIndicator(text, type) {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  el.className = 'save-indicator show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ========== SEARCH ==========
document.getElementById('searchInput').addEventListener('input', () => render());

// ========== INIT ==========
loadFiles();
</script>
</body>
</html>
