<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoFlow Design Assets</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface-hover: #1f1f2a;
  --border: #2a2a35;
  --text: #e4e4e8;
  --text-muted: rgba(255,255,255,0.35);
  --accent: #578cff;
  --success: #00d15c;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  justify-content: center;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 1080px;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
}
.header-title span { color: var(--accent); }
.search-box {
  flex: 1;
  max-width: 360px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 9px 16px 9px 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: "\1F50D";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  opacity: 0.4;
}
.stats {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Content */
.content {
  padding: 32px;
  max-width: 1080px;
  margin: 0 auto;
}
.section { margin-bottom: 40px; }
.section-title {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}

/* Icon Grid - 10 columns */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
}

/* Icon Unit (pair: line + fill) */
.icon-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  border-radius: 8px;
  cursor: grab;
  transition: background 0.15s;
  border: 1px solid transparent;
  padding: 4px;
}
.icon-unit:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}
.icon-unit.copied {
  border-color: var(--success);
  background: rgba(0, 209, 92, 0.06);
}

/* Icon cell (single slot: line or fill) */
.icon-cell {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: background 0.1s;
  position: relative;
}
.icon-cell:hover { background: rgba(255,255,255,0.04); }
.icon-cell img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}
.icon-cell.empty {
  opacity: 0.15;
  pointer-events: none;
}
.icon-cell .cell-label {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
  display: none;
}
.icon-unit:hover .cell-label { display: block; }

/* Icon name */
.icon-unit-name {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  padding: 4px 2px 6px;
  line-height: 1.3;
  word-break: break-all;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Drag states */
.sortable-ghost {
  opacity: 0.2;
  border: 1px dashed var(--accent);
}
.sortable-chosen { cursor: grabbing; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--success);
  color: #000;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease;
  z-index: 1000;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Loading & Empty */
.loading, .empty {
  text-align: center;
  padding: 60px;
  color: rgba(255,255,255,0.35);
  font-size: 14px;
}
.loading::after {
  content: "";
  display: block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 16px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Save indicator */
.save-indicator {
  position: fixed;
  top: 16px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
}
.save-indicator.show { opacity: 1; }
.save-indicator.success { color: var(--success); border-color: var(--success); }
.save-indicator.error { color: #ff5555; border-color: #ff5555; }

/* PNG section uses single row (no line/fill pairing) */
.icon-grid-png .icon-unit .icon-cell { aspect-ratio: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title"><span>EcoFlow</span> Design Assets</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索图标名称...">
    </div>
    <div class="stats" id="stats">加载中...</div>
  </div>
</div>

<div class="content" id="content">
  <div class="loading">正在加载资产列表...</div>
</div>

<div class="toast" id="toast"></div>
<div class="save-indicator" id="saveIndicator"></div>

<script>
// ========== CONFIG ==========
const OWNER = 'wangshuaisuai';
const REPO = 'ecoflow-design-assets';
const BRANCH = 'main';
const CDN_BASE = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}`;

function getToken() {
  let token = localStorage.getItem('gh_pat');
  if (!token) {
    token = prompt('请输入 GitHub Personal Access Token（仅需输入一次）：');
    if (token) localStorage.setItem('gh_pat', token.trim());
  }
  return token;
}

// ========== STATE ==========
let svgFiles = [];
let pngFiles = [];
let svgPairs = []; // [{base, line, fill}]
let orderData = { svg: [], png: [] };
let orderSha = null;
let saveTimeout = null;

// ========== GITHUB API ==========
async function ghAPI(path, method, body) {
  const headers = { 'Accept': 'application/vnd.github+json' };
  const token = localStorage.getItem('gh_pat');
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (method && method !== 'GET' && !token) {
    const newToken = getToken();
    if (!newToken) return null;
    headers['Authorization'] = `Bearer ${newToken}`;
  }
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}${path}`, {
      method: method || 'GET',
      headers,
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) return null;
    return res.json();
  } catch (e) {
    console.error('API Error:', e);
    return null;
  }
}

// ========== DATA PROCESSING ==========
function buildSvgPairs(files) {
  const map = {};
  for (const f of files) {
    const name = f.replace(/\.svg$/, '');
    let base, variant;
    if (name.endsWith('-line')) {
      base = name.slice(0, -5);
      variant = 'line';
    } else if (name.endsWith('-fill')) {
      base = name.slice(0, -5);
      variant = 'fill';
    } else {
      base = name;
      variant = 'line';
    }
    if (!map[base]) map[base] = { base, line: null, fill: null };
    map[base][variant] = f;
  }
  return Object.values(map);
}

function getDisplayName(base) {
  return base.replace(/^icon-/, '');
}

function applyPairOrder(pairs, order) {
  if (!order || !order.length) return pairs.sort((a, b) => a.base.localeCompare(b.base));
  const ordered = [];
  for (const base of order) {
    const p = pairs.find(x => x.base === base);
    if (p) ordered.push(p);
  }
  for (const p of pairs) {
    if (!ordered.includes(p)) ordered.push(p);
  }
  return ordered;
}

function applyOrder(files, order) {
  if (!order || !order.length) return files.sort();
  const ordered = [];
  for (const name of order) {
    if (files.includes(name)) ordered.push(name);
  }
  for (const name of files) {
    if (!ordered.includes(name)) ordered.push(name);
  }
  return ordered;
}

// ========== LOAD ==========
async function loadFiles() {
  try {
    const [svgData, pngData, orderRes] = await Promise.all([
      ghAPI('/contents/icons/svg'),
      ghAPI('/contents/icons/png'),
      ghAPI('/contents/config/order.json')
    ]);

    if (!svgData && !pngData) {
      document.getElementById('content').innerHTML = '<div class="empty">无法加载资产列表。<br><br><button onclick="localStorage.removeItem(\'gh_pat\');location.reload()" style="padding:8px 16px;border-radius:6px;border:1px solid #578cff;background:transparent;color:#578cff;cursor:pointer;font-size:13px">重新输入 Token</button></div>';
      return;
    }

    svgFiles = (svgData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);
    pngFiles = (pngData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);

    if (orderRes && orderRes.content) {
      try {
        orderData = JSON.parse(atob(orderRes.content.replace(/\n/g, '')));
        orderSha = orderRes.sha;
      } catch(e) { orderData = { svg: [], png: [] }; }
    }

    svgPairs = buildSvgPairs(svgFiles);
    svgPairs = applyPairOrder(svgPairs, orderData.svg || []);
    pngFiles = applyOrder(pngFiles, orderData.png || []);

    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">加载失败: ${e.message}<br><br><button onclick="localStorage.removeItem('gh_pat');location.reload()" style="padding:8px 16px;border-radius:6px;border:1px solid #578cff;background:transparent;color:#578cff;cursor:pointer;font-size:13px">重新输入 Token</button></div>`;
  }
}

// ========== RENDER ==========
function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const filteredPairs = svgPairs.filter(p => p.base.toLowerCase().includes(query));
  const filteredPng = pngFiles.filter(f => f.toLowerCase().includes(query));
  const totalSvg = svgPairs.length;
  const totalPng = pngFiles.length;

  document.getElementById('stats').textContent = query
    ? `显示 ${filteredPairs.length + filteredPng.length} 项`
    : `SVG ${totalSvg} 组 · PNG ${totalPng} 个`;

  const content = document.getElementById('content');
  let html = '';

  if (filteredPairs.length > 0) {
    html += `<div class="section">
      <div class="section-title">SVG Icons <span class="section-count">${filteredPairs.length}</span></div>
      <div class="icon-grid" id="grid-svg">
        ${filteredPairs.map(p => svgUnitCard(p)).join('')}
      </div>
    </div>`;
  }

  if (filteredPng.length > 0) {
    html += `<div class="section">
      <div class="section-title">PNG Assets <span class="section-count">${filteredPng.length}</span></div>
      <div class="icon-grid icon-grid-png" id="grid-png">
        ${filteredPng.map(f => pngCard(f)).join('')}
      </div>
    </div>`;
  }

  if (!filteredPairs.length && !filteredPng.length) {
    html = '<div class="empty">没有找到匹配的资产</div>';
  }

  content.innerHTML = html;
  initSortable();
}

function svgUnitCard(pair) {
  const lineUrl = pair.line ? `${CDN_BASE}/icons/svg/${pair.line}` : '';
  const fillUrl = pair.fill ? `${CDN_BASE}/icons/svg/${pair.fill}` : '';
  const displayName = getDisplayName(pair.base);

  return `<div class="icon-unit" data-base="${pair.base}">
    <div class="icon-cell ${pair.line ? '' : 'empty'}" onclick="event.stopPropagation();${pair.line ? `copyFile(this.parentElement,'svg','${pair.line}')` : ''}">
      ${pair.line ? `<img src="${lineUrl}" alt="${displayName}-line" loading="lazy">` : '<span style="font-size:20px;opacity:0.3">—</span>'}
      <span class="cell-label">line</span>
    </div>
    <div class="icon-cell ${pair.fill ? '' : 'empty'}" onclick="event.stopPropagation();${pair.fill ? `copyFile(this.parentElement,'svg','${pair.fill}')` : ''}">
      ${pair.fill ? `<img src="${fillUrl}" alt="${displayName}-fill" loading="lazy">` : '<span style="font-size:20px;opacity:0.3">—</span>'}
      <span class="cell-label">fill</span>
    </div>
    <div class="icon-unit-name" title="${pair.base}">${displayName}</div>
  </div>`;
}

function pngCard(filename) {
  const src = `${CDN_BASE}/icons/png/${filename}`;
  const displayName = filename.replace(/^icon-/, '').replace(/@[23]x\.png$/, '').replace(/\.png$/, '');
  return `<div class="icon-unit" data-name="${filename}" onclick="copyFile(this,'png','${filename}')">
    <div class="icon-cell">
      <img src="${src}" alt="${displayName}" loading="lazy">
    </div>
    <div class="icon-unit-name" title="${filename}">${displayName}</div>
  </div>`;
}

// ========== COPY ==========
function copyFile(el, type, filename) {
  const url = `${CDN_BASE}/icons/${type}/${filename}`;
  navigator.clipboard.writeText(url).then(() => {
    const unit = el.closest('.icon-unit');
    unit.classList.add('copied');
    showToast(`已复制: ${filename}`);
    setTimeout(() => unit.classList.remove('copied'), 1500);
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ========== SORTABLE ==========
function initSortable() {
  const svgGrid = document.getElementById('grid-svg');
  const pngGrid = document.getElementById('grid-png');

  if (svgGrid) {
    new Sortable(svgGrid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: () => saveOrder()
    });
  }
  if (pngGrid) {
    new Sortable(pngGrid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: () => saveOrder()
    });
  }
}

function saveOrder() {
  const svgGrid = document.getElementById('grid-svg');
  const pngGrid = document.getElementById('grid-png');

  if (svgGrid) {
    orderData.svg = [...svgGrid.querySelectorAll('.icon-unit')].map(el => el.dataset.base);
  }
  if (pngGrid) {
    orderData.png = [...pngGrid.querySelectorAll('.icon-unit')].map(el => el.dataset.name);
  }

  clearTimeout(saveTimeout);
  showSaveIndicator('保存中...');
  saveTimeout = setTimeout(commitOrder, 1500);
}

async function commitOrder() {
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(orderData, null, 2))));
    const body = { message: '更新图标排序', content, branch: BRANCH };
    if (orderSha) body.sha = orderSha;

    const res = await ghAPI('/contents/config/order.json', 'PUT', body);
    if (res && res.content) {
      orderSha = res.content.sha;
      showSaveIndicator('已保存', 'success');
    } else {
      showSaveIndicator('保存失败', 'error');
    }
  } catch (e) {
    showSaveIndicator('保存失败', 'error');
  }
}

function showSaveIndicator(text, type) {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  el.className = 'save-indicator show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ========== SEARCH ==========
document.getElementById('searchInput').addEventListener('input', () => render());

// ========== INIT ==========
if (!localStorage.getItem('gh_pat')) {
  const t = prompt('首次使用请输入 GitHub Token（用于读取仓库资产）：');
  if (t) localStorage.setItem('gh_pat', t.trim());
}
loadFiles();
</script>
</body>
</html>
