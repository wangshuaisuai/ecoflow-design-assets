<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoFlow Design Assets</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface-hover: #1f1f2a;
  --border: #2a2a35;
  --text: #e4e4e8;
  --text-muted: rgba(255,255,255,0.35);
  --accent: #578cff;
  --success: #00d15c;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  justify-content: center;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 960px;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
}
.header-title span { color: var(--accent); }
.search-box {
  flex: 1;
  max-width: 320px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 8px 14px 8px 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: "\1F50D";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  opacity: 0.4;
}
.stats {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

.content {
  padding: 24px 32px;
  max-width: 960px;
  margin: 0 auto;
}
.section { margin-bottom: 32px; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  background: var(--surface);
  padding: 1px 7px;
  border-radius: 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
}

.icon-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 2px;
}

.icon-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px 8px;
  border-radius: 6px;
  cursor: grab;
  transition: background 0.12s;
  border: 1px solid transparent;
}
.icon-card:hover {
  background: var(--surface-hover);
  border-color: var(--border);
}
.icon-card:active { cursor: grabbing; }
.icon-card.copied {
  border-color: var(--success);
  background: rgba(0,209,92,0.06);
}
.icon-card img {
  width: 24px;
  height: 24px;
  object-fit: contain;
  margin-bottom: 6px;
}
.icon-card .icon-name {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.2;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sortable-ghost {
  opacity: 0.2;
  border: 1px dashed var(--accent);
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--success);
  color: #000;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease;
  z-index: 1000;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.loading, .empty {
  text-align: center;
  padding: 60px;
  color: rgba(255,255,255,0.35);
  font-size: 14px;
}
.loading::after {
  content: "";
  display: block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 12px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.save-indicator {
  position: fixed;
  top: 14px;
  right: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
}
.save-indicator.show { opacity: 1; }
.save-indicator.success { color: var(--success); border-color: var(--success); }
.save-indicator.error { color: #ff5555; border-color: #ff5555; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title"><span>EcoFlow</span> Design Assets</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索...">
    </div>
    <div class="stats" id="stats">加载中...</div>
  </div>
</div>

<div class="content" id="content">
  <div class="loading">正在加载资产列表...</div>
</div>

<div class="toast" id="toast"></div>
<div class="save-indicator" id="saveIndicator"></div>

<script>
const OWNER = 'wangshuaisuai';
const REPO = 'ecoflow-design-assets';
const BRANCH = 'main';
const CDN_BASE = `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}`;

const GROUPS = ['widget','tabbar','feature','battery','notify','weather','devicecard','device','basic'];
const GROUP_LABELS = {widget:'Widget',tabbar:'Tabbar',feature:'Feature',battery:'Battery',notify:'Notify',weather:'Weather',devicecard:'Device Card',device:'Device',basic:'Basic'};

function getToken() {
  let token = localStorage.getItem('gh_pat');
  if (!token) {
    token = prompt('请输入 GitHub Token（仅需一次）：');
    if (token) localStorage.setItem('gh_pat', token.trim());
  }
  return token;
}

let svgFiles = [];
let pngFiles = [];
let orderData = {};
let orderSha = null;
let saveTimeout = null;

async function ghAPI(path, method, body) {
  const headers = { 'Accept': 'application/vnd.github+json' };
  const token = localStorage.getItem('gh_pat');
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (method && method !== 'GET' && !token) {
    const t = getToken();
    if (!t) return null;
    headers['Authorization'] = `Bearer ${t}`;
  }
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}${path}`, {
      method: method || 'GET', headers,
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) return null;
    return res.json();
  } catch (e) { return null; }
}

function classifyIcon(filename) {
  const name = filename.replace(/\.svg$/, '');
  for (const g of GROUPS) {
    if (name.startsWith(`icon-${g}-`)) return g;
  }
  return 'basic';
}

function getDisplayName(filename) {
  let name = filename.replace(/\.svg$/, '').replace(/@[23]x\.png$/, '').replace(/\.png$/, '');
  name = name.replace(/^icon-/, '').replace(/^img-/, '');
  for (const g of GROUPS) {
    if (name.startsWith(`${g}-`)) { name = name.slice(g.length + 1); break; }
  }
  return name;
}

function applyOrder(items, order) {
  if (!order || !order.length) return items.sort();
  const ordered = [];
  for (const n of order) { if (items.includes(n)) ordered.push(n); }
  for (const n of items) { if (!ordered.includes(n)) ordered.push(n); }
  return ordered;
}

async function loadFiles() {
  try {
    const [svgData, pngData, orderRes] = await Promise.all([
      ghAPI('/contents/icons/svg'),
      ghAPI('/contents/icons/png'),
      ghAPI('/contents/config/order.json')
    ]);

    if (!svgData && !pngData) {
      document.getElementById('content').innerHTML = '<div class="empty">无法加载资产。<br><br><button onclick="localStorage.removeItem(\'gh_pat\');location.reload()" style="padding:8px 16px;border-radius:6px;border:1px solid #578cff;background:transparent;color:#578cff;cursor:pointer;font-size:13px">重新输入 Token</button></div>';
      return;
    }

    svgFiles = (svgData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);
    pngFiles = (pngData || []).filter(f => f.name !== '.gitkeep').map(f => f.name);

    if (orderRes && orderRes.content) {
      try {
        orderData = JSON.parse(atob(orderRes.content.replace(/\n/g, '')));
        orderSha = orderRes.sha;
      } catch(e) { orderData = {}; }
    }

    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const content = document.getElementById('content');
  let html = '';
  let totalCount = 0;

  for (const group of GROUPS) {
    let files = svgFiles.filter(f => classifyIcon(f) === group);
    files = applyOrder(files, orderData[group]);
    if (query) files = files.filter(f => f.toLowerCase().includes(query));
    if (!files.length) continue;
    totalCount += files.length;

    html += `<div class="section">
      <div class="section-title">${GROUP_LABELS[group]} <span class="section-count">${files.length}</span></div>
      <div class="icon-grid" id="grid-${group}" data-group="${group}">
        ${files.map(f => iconCard(f, 'svg')).join('')}
      </div>
    </div>`;
  }

  let pngs = applyOrder(pngFiles, orderData['png']);
  if (query) pngs = pngs.filter(f => f.toLowerCase().includes(query));
  if (pngs.length) {
    totalCount += pngs.length;
    html += `<div class="section">
      <div class="section-title">切图 <span class="section-count">${pngs.length}</span></div>
      <div class="icon-grid" id="grid-png" data-group="png">
        ${pngs.map(f => iconCard(f, 'png')).join('')}
      </div>
    </div>`;
  }

  if (!html) html = '<div class="empty">没有匹配的资产</div>';

  document.getElementById('stats').textContent = `共 ${svgFiles.length + pngFiles.length} 个资产`;
  content.innerHTML = html;
  initSortable();
}

function iconCard(filename, type) {
  const src = `${CDN_BASE}/icons/${type}/${filename}`;
  const displayName = getDisplayName(filename);
  return `<div class="icon-card" data-name="${filename}" data-type="${type}" onclick="copyLink(this,'${type}','${filename}')">
    <img src="${src}" alt="${displayName}" loading="lazy">
    <span class="icon-name" title="${filename}">${displayName}</span>
  </div>`;
}

function copyLink(el, type, filename) {
  const url = `${CDN_BASE}/icons/${type}/${filename}`;
  navigator.clipboard.writeText(url).then(() => {
    el.classList.add('copied');
    showToast(`已复制: ${filename}`);
    setTimeout(() => el.classList.remove('copied'), 1200);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function initSortable() {
  document.querySelectorAll('.icon-grid').forEach(grid => {
    new Sortable(grid, {
      animation: 120,
      ghostClass: 'sortable-ghost',
      onEnd: () => saveOrder()
    });
  });
}

function saveOrder() {
  document.querySelectorAll('.icon-grid').forEach(grid => {
    const group = grid.dataset.group;
    orderData[group] = [...grid.querySelectorAll('.icon-card')].map(el => el.dataset.name);
  });
  clearTimeout(saveTimeout);
  showSaveIndicator('保存中...');
  saveTimeout = setTimeout(commitOrder, 1500);
}

async function commitOrder() {
  try {
    const c = btoa(unescape(encodeURIComponent(JSON.stringify(orderData, null, 2))));
    const body = { message: '更新排序', content: c, branch: BRANCH };
    if (orderSha) body.sha = orderSha;
    const res = await ghAPI('/contents/config/order.json', 'PUT', body);
    if (res && res.content) {
      orderSha = res.content.sha;
      showSaveIndicator('已保存', 'success');
    } else { showSaveIndicator('保存失败', 'error'); }
  } catch (e) { showSaveIndicator('保存失败', 'error'); }
}

function showSaveIndicator(text, type) {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  el.className = 'save-indicator show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('searchInput').addEventListener('input', () => render());

if (!localStorage.getItem('gh_pat')) {
  const t = prompt('首次使用请输入 GitHub Token：');
  if (t) localStorage.setItem('gh_pat', t.trim());
}
loadFiles();
</script>
</body>
</html>
